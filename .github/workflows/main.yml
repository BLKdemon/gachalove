name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create and Build
      run: |
        # Crear proyecto directamente aquí
        cordova create app_build com.gachalove.app GachaLove
        cd app_build
        cordova platform add android@12.0.0
        # Mover tus archivos desde la raíz de GitHub a la carpeta del proyecto
        rm -rf www
        cp -r ../www .
        cp ../config.xml .
        # Construir
        cordova build android --release

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: GachaLove-APK
        path: app_build/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

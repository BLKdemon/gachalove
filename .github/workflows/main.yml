name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova
      run: npm install -g cordova@latest

    - name: Build Project
      run: |
        # Crear un entorno limpio
        cordova create app_build com.gachalove.app GachaLove
        cd app_build
        cordova platform add android@12.0.0
        # Mover los archivos del juego
        rm -rf www
        cp -r ../www .
        [ -f ../config.xml ] && cp ../config.xml .
        # Ejecutar build
        cordova build android --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GachaLove-APK
        path: app_build/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
